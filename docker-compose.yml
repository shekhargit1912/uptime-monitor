name: uptime-monitor

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: uptime-backend:local
    environment:
      DATABASE_URL: sqlite:////data/uptime.db
      CHECK_INTERVAL: ${CHECK_INTERVAL:-60}
    volumes:
      - sqlitedata:/data:rw
    ports: [] # Kept isolated from host; frontend routes traffic
    networks:
      - app-tier
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: uptime-frontend:local
    ports:
      - "${HOST_PORT:-8080}:8080"
    networks:
      - app-tier
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sqlitedata:
    name: uptime_sqlite_data

networks:
  app-tier:
    driver: bridge
