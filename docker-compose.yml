services:
  backend:
    build: ./backend
    environment:
      # SQLite file lives on the named volume below so data survives restarts.
      DATABASE_URL: sqlite:////data/uptime.db
      CHECK_INTERVAL: ${CHECK_INTERVAL:-60}
    volumes:
      - sqlitedata:/data
    healthcheck:
      # slim image has no curl, so probe /health with Python.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      # host 8080 -> container 8080 (nginx-unprivileged listens on 8080).
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sqlitedata:
